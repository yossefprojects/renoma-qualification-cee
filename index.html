  <body>
    <div id="root"><div id="loader">Chargement de l'outil…</div></div>

    <script>
      (function () {
        var React = window.React,
          ReactDOM = window.ReactDOM;

        // --- React hooks as globals (component uses them bare after imports are stripped) ---
        window.useState = React.useState;
        window.useEffect = React.useEffect;
        window.useRef = React.useRef;
        window.useMemo = React.useMemo;

        // --- cn() shim (clsx + tailwind-merge → simple truthy join; conditional classes are exclusive) ---
        window.cn = function cn() {
          var out = [];
          for (var i = 0; i < arguments.length; i++) {
            var a = arguments[i];
            if (!a) continue;
            if (typeof a === "string") out.push(a);
            else if (Array.isArray(a)) {
              var f = cn.apply(null, a);
              if (f) out.push(f);
            }
          }
          return out.join(" ");
        };

        // --- lucide-react icon shims (inline SVG) ---
        var ICONS = {
          MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
          Home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
          User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
          Thermometer: '<path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/>',
          CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
          FileText: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>',
          AlertTriangle: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
          XCircle: '<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
          Check: '<path d="M20 6 9 17l-5-5"/>',
          ChevronDown: '<path d="m6 9 6 6 6-6"/>',
          ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
          ArrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
          Phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/>',
          Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
          Calendar: '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
          Printer: '<path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>',
          Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
        };
        function makeIcon(name) {
          return function (props) {
            props = props || {};
            return React.createElement("svg", {
              xmlns: "http://www.w3.org/2000/svg",
              viewBox: "0 0 24 24",
              fill: "none",
              stroke: "currentColor",
              strokeWidth: props.strokeWidth || 2,
              strokeLinecap: "round",
              strokeLinejoin: "round",
              className: props.className,
              "aria-hidden": true,
              dangerouslySetInnerHTML: { __html: ICONS[name] },
            });
          };
        }
        Object.keys(ICONS).forEach(function (n) {
          window[n] = makeIcon(n);
        });

        function showError(msg) {
          document.getElementById("root").innerHTML =
            '<pre style="color:#b91c1c;padding:24px;white-space:pre-wrap;font-family:monospace">' +
            String(msg) +
            "</pre>";
        }

        window.__mount = function (App) {
          ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
        };

        fetch("app.tsx")
          .then(function (r) {
            if (!r.ok) throw new Error("Impossible de charger app.tsx (" + r.status + ")");
            return r.text();
          })
          .then(function (src) {
            // Remove the import statements and the default-export keyword.
            src = src.replace(/import[\s\S]*?from\s*["'][^"']*["'];?/g, "");
            src = src.replace(/export\s+default\s+function/, "function");
            var out = Babel.transform(src, {
              presets: [["typescript", { isTSX: true, allExtensions: true }], "react"],
              filename: "app.tsx",
            }).code;
            // Run in the global scope and mount from within that same scope.
            (0, eval)(out + "\n;window.__mount(RenomaQualificationProspect);");
          })
          .catch(function (e) {
            showError((e && e.stack) || e);
          });
      })();
    </script>
  </body>
</html>
